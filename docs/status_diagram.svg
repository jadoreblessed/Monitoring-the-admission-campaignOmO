<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" style="width:100%;background:#ffffff;font-family:Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#888780"/>
  </marker>
  <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#A32D2D"/>
  </marker>
  <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3B6D11"/>
  </marker>
</defs>

<!-- title -->
<text x="360" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Диаграмма статусов заявки</text>

<!-- START -->
<circle cx="60" cy="210" r="18" fill="#2C2C2A"/>
<text x="60" y="215" text-anchor="middle" font-size="11" fill="#ffffff">start</text>

<!-- NEW -->
<rect x="120" y="183" width="110" height="54" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="175" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">new</text>
<text x="175" y="223" text-anchor="middle" font-size="11" fill="#5F5E5A">Новая заявка</text>

<!-- REVIEW -->
<rect x="300" y="183" width="120" height="54" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="360" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">review</text>
<text x="360" y="223" text-anchor="middle" font-size="11" fill="#5F5E5A">На рассмотрении</text>

<!-- ENROLLED -->
<rect x="500" y="120" width="130" height="54" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text x="565" y="142" text-anchor="middle" font-size="13" font-weight="bold" fill="#3B6D11">enrolled</text>
<text x="565" y="160" text-anchor="middle" font-size="11" fill="#3B6D11">Зачислен</text>

<!-- REJECTED -->
<rect x="500" y="270" width="130" height="54" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="565" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#A32D2D">rejected</text>
<text x="565" y="310" text-anchor="middle" font-size="11" fill="#A32D2D">Отказ</text>

<!-- END enrolled -->
<circle cx="672" cy="147" r="14" fill="#2C2C2A"/>
<circle cx="672" cy="147" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>

<!-- END rejected -->
<circle cx="672" cy="297" r="14" fill="#2C2C2A"/>
<circle cx="672" cy="297" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>

<!-- start → new -->
<line x1="78" y1="210" x2="118" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- new → review -->
<line x1="230" y1="210" x2="298" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="264" y="202" text-anchor="middle" font-size="10" fill="#888780">взят в работу</text>

<!-- review → enrolled -->
<path d="M420,197 C455,197 470,147 498,147" stroke="#3B6D11" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
<text x="458" y="163" text-anchor="middle" font-size="10" fill="#3B6D11">зачислен</text>

<!-- review → rejected -->
<path d="M420,223 C455,223 470,297 498,297" stroke="#A32D2D" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
<text x="458" y="272" text-anchor="middle" font-size="10" fill="#A32D2D">отказ</text>

<!-- new → rejected (прямой отказ) -->
<path d="M175,237 C175,340 460,340 498,310" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-red)"/>
<text x="310" y="358" text-anchor="middle" font-size="10" fill="#A32D2D">прямой отказ</text>

<!-- enrolled → end -->
<line x1="630" y1="147" x2="656" y2="147" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arr-green)"/>

<!-- rejected → end -->
<line x1="630" y1="297" x2="656" y2="297" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr-red)"/>

<!-- Легенда -->
<rect x="30" y="360" width="660" height="44" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>

<circle cx="60" cy="382" r="6" fill="#2C2C2A"/>
<text x="72" y="386" font-size="11" fill="#5F5E5A">Начало / конец</text>

<rect x="150" y="376" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="170" y="386" font-size="11" fill="#5F5E5A">Активный статус</text>

<rect x="290" y="376" width="14" height="14" rx="3" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
<text x="310" y="386" font-size="11" fill="#5F5E5A">Терминальный (успех)</text>

<rect x="460" y="376" width="14" height="14" rx="3" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
<text x="480" y="386" font-size="11" fill="#5F5E5A">Терминальный (отказ)</text>

<line x1="590" y1="383" x2="610" y2="383" stroke="#888780" stroke-width="1.2" stroke-dasharray="4,2"/>
<text x="616" y="386" font-size="11" fill="#5F5E5A">Редкий переход</text>

</svg>
