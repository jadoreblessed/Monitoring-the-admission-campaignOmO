<svg viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" style="width:100%;background:#ffffff;font-family:Arial,sans-serif">

<!-- title -->
<text x="430" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">ERD — схема базы данных</text>
<text x="430" y="46" text-anchor="middle" font-size="11" fill="#888780">Мониторинг приёмной кампании университета</text>

<!-- applicants -->
<rect x="20" y="65" width="185" height="205" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<rect x="20" y="65" width="185" height="34" rx="8" fill="#444441"/>
<rect x="20" y="90" width="185" height="9" fill="#444441"/>
<text x="112" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">applicants</text>
<text x="112" y="102" text-anchor="middle" font-size="10" fill="#B4B2A9">Абитуриенты</text>
<text x="36" y="122" font-size="11" font-weight="bold" fill="#3B6D11">PK  id</text>
<text x="155" y="122" font-size="10" fill="#5F5E5A">INT</text>
<text x="36" y="133" font-size="9" fill="#888780">уникальный номер абитуриента</text>
<line x1="20" y1="138" x2="205" y2="138" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="36" y="152" font-size="11" fill="#2C2C2A">fio</text>
<text x="155" y="152" font-size="10" fill="#5F5E5A">VARCHAR(255)</text>
<text x="36" y="163" font-size="9" fill="#888780">фамилия имя отчество</text>
<line x1="20" y1="168" x2="205" y2="168" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="36" y="182" font-size="11" fill="#2C2C2A">birth_year</text>
<text x="155" y="182" font-size="10" fill="#5F5E5A">INT</text>
<text x="36" y="193" font-size="9" fill="#888780">год рождения (1900–2010)</text>
<line x1="20" y1="198" x2="205" y2="198" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="36" y="212" font-size="11" fill="#2C2C2A">region</text>
<text x="155" y="212" font-size="10" fill="#5F5E5A">VARCHAR(100)</text>
<text x="36" y="223" font-size="9" fill="#888780">регион проживания</text>
<line x1="20" y1="228" x2="205" y2="228" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="36" y="244" font-size="9" fill="#A32D2D">⚠ один абитуриент может</text>
<text x="36" y="256" font-size="9" fill="#A32D2D">подать несколько заявок</text>

<!-- programs -->
<rect x="655" y="65" width="185" height="205" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<rect x="655" y="65" width="185" height="34" rx="8" fill="#444441"/>
<rect x="655" y="90" width="185" height="9" fill="#444441"/>
<text x="747" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">programs</text>
<text x="747" y="102" text-anchor="middle" font-size="10" fill="#B4B2A9">Программы обучения</text>
<text x="671" y="122" font-size="11" font-weight="bold" fill="#3B6D11">PK  program_code</text>
<text x="800" y="122" font-size="10" fill="#5F5E5A">VARCHAR</text>
<text x="671" y="133" font-size="9" fill="#888780">код программы, напр. CS-01</text>
<line x1="655" y1="138" x2="840" y2="138" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="671" y="152" font-size="11" fill="#2C2C2A">program_name</text>
<text x="800" y="152" font-size="10" fill="#5F5E5A">VARCHAR(255)</text>
<text x="671" y="163" font-size="9" fill="#888780">название программы</text>
<line x1="655" y1="168" x2="840" y2="168" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="671" y="182" font-size="11" fill="#2C2C2A">faculty</text>
<text x="800" y="182" font-size="10" fill="#5F5E5A">VARCHAR(255)</text>
<text x="671" y="193" font-size="9" fill="#888780">название факультета</text>
<line x1="655" y1="198" x2="840" y2="198" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="671" y="218" font-size="9" fill="#A32D2D">⚠ несколько программ могут</text>
<text x="671" y="229" font-size="9" fill="#A32D2D">принадлежать одному факультету</text>
<text x="671" y="245" font-size="9" fill="#888780">напр. CS-01, CS-02, CS-03</text>
<text x="671" y="256" font-size="9" fill="#888780">все → Факультет ИТ</text>

<!-- applications -->
<rect x="295" y="140" width="270" height="310" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.2"/>
<rect x="295" y="140" width="270" height="34" rx="8" fill="#185FA5"/>
<rect x="295" y="165" width="270" height="9" fill="#185FA5"/>
<text x="430" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">applications</text>
<text x="430" y="176" text-anchor="middle" font-size="10" fill="#85B7EB">Заявки на поступление — главная таблица</text>
<text x="311" y="200" font-size="11" font-weight="bold" fill="#3B6D11">PK  id</text>
<text x="520" y="200" font-size="10" fill="#5F5E5A">INT</text>
<text x="311" y="211" font-size="9" fill="#888780">уникальный номер заявки</text>
<line x1="295" y1="216" x2="565" y2="216" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="230" font-size="11" font-weight="bold" fill="#A32D2D">FK  applicant_id</text>
<text x="520" y="230" font-size="10" fill="#5F5E5A">INT</text>
<text x="311" y="241" font-size="9" fill="#888780">ссылка на запись в таблице applicants</text>
<line x1="295" y1="246" x2="565" y2="246" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="260" font-size="11" font-weight="bold" fill="#A32D2D">FK  program_code</text>
<text x="520" y="260" font-size="10" fill="#5F5E5A">VARCHAR</text>
<text x="311" y="271" font-size="9" fill="#888780">ссылка на запись в таблице programs</text>
<line x1="295" y1="276" x2="565" y2="276" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="290" font-size="11" fill="#2C2C2A">wave</text>
<text x="520" y="290" font-size="10" fill="#5F5E5A">INT</text>
<text x="311" y="301" font-size="9" fill="#888780">волна зачисления: 1, 2 или 3</text>
<line x1="295" y1="306" x2="565" y2="306" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="320" font-size="11" fill="#2C2C2A">source</text>
<text x="520" y="320" font-size="10" fill="#5F5E5A">VARCHAR(50)</text>
<text x="311" y="331" font-size="9" fill="#888780">откуда пришёл: site/olymp/aggregator/other</text>
<line x1="295" y1="336" x2="565" y2="336" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="350" font-size="11" fill="#2C2C2A">status</text>
<text x="520" y="350" font-size="10" fill="#5F5E5A">VARCHAR(20)</text>
<text x="311" y="361" font-size="9" fill="#888780">текущий статус: new/review/enrolled/rejected</text>
<line x1="295" y1="366" x2="565" y2="366" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="380" font-size="11" fill="#2C2C2A">created_at</text>
<text x="520" y="380" font-size="10" fill="#5F5E5A">TIMESTAMP</text>
<text x="311" y="391" font-size="9" fill="#888780">дата и время подачи заявки</text>
<line x1="295" y1="396" x2="565" y2="396" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="410" font-size="11" fill="#2C2C2A">status_changed_at</text>
<text x="520" y="410" font-size="10" fill="#5F5E5A">TIMESTAMP</text>
<text x="311" y="421" font-size="9" fill="#888780">дата последнего изменения статуса</text>
<line x1="295" y1="426" x2="565" y2="426" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="311" y="440" font-size="9" fill="#A32D2D">⚠ created_at всегда должна быть ≤ status_changed_at</text>

<!-- status_logs -->
<rect x="295" y="470" width="270" height="78" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<rect x="295" y="470" width="270" height="28" rx="8" fill="#BA7517"/>
<rect x="295" y="489" width="270" height="9" fill="#BA7517"/>
<text x="430" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">status_logs</text>
<text x="430" y="500" text-anchor="middle" font-size="10" fill="#FAC775">Журнал всех смен статуса</text>
<text x="311" y="518" font-size="10" fill="#854F0B">PK id  ·  FK application_id (ссылка на заявку)</text>
<text x="311" y="532" font-size="10" fill="#854F0B">old_status · new_status · changed_at · changed_by</text>
<text x="311" y="544" font-size="9" fill="#888780">кто и когда изменил статус заявки</text>

<!-- FK связи -->
<!-- applicants 1 → N applications -->
<line x1="205" y1="155" x2="295" y2="233" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="208" y="170" font-size="11" font-weight="bold" fill="#A32D2D">1</text>
<text x="278" y="228" font-size="11" font-weight="bold" fill="#A32D2D">N</text>
<text x="210" y="195" font-size="9" fill="#A32D2D">один абитуриент</text>
<text x="210" y="207" font-size="9" fill="#A32D2D">→ много заявок</text>

<!-- programs 1 → N applications -->
<line x1="655" y1="155" x2="565" y2="263" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="645" y="170" font-size="11" font-weight="bold" fill="#A32D2D">1</text>
<text x="567" y="258" font-size="11" font-weight="bold" fill="#A32D2D">N</text>
<text x="580" y="195" font-size="9" fill="#A32D2D">одна программа</text>
<text x="580" y="207" font-size="9" fill="#A32D2D">→ много заявок</text>

<!-- applications → status_logs -->
<line x1="430" y1="450" x2="430" y2="470" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="435" y="464" font-size="9" fill="#BA7517">каждая смена статуса пишется сюда</text>

<!-- Легенда слева -->
<rect x="20" y="300" width="240" height="120" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="36" y="322" font-size="12" font-weight="bold" fill="#2C2C2A">Легенда</text>
<text x="36" y="342" font-size="11" font-weight="bold" fill="#3B6D11">PK</text>
<text x="54" y="342" font-size="11" fill="#5F5E5A">— первичный ключ (уникальный ID)</text>
<text x="36" y="360" font-size="11" font-weight="bold" fill="#A32D2D">FK</text>
<text x="54" y="360" font-size="11" fill="#5F5E5A">— внешний ключ (ссылка)</text>
<line x1="36" y1="374" x2="66" y2="374" stroke="#888780" stroke-width="1.2" stroke-dasharray="4,2"/>
<text x="72" y="378" font-size="11" fill="#5F5E5A">— связь между таблицами</text>
<text x="36" y="396" font-size="10" fill="#A32D2D">⚠ — важное ограничение данных</text>
<text x="36" y="410" font-size="10" fill="#888780">серый текст — пояснение к полю</text>

<!-- Легенда справа -->
<rect x="620" y="300" width="220" height="120" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="636" y="322" font-size="12" font-weight="bold" fill="#2C2C2A">Таблицы</text>
<rect x="636" y="332" width="10" height="10" rx="2" fill="#444441"/>
<text x="652" y="341" font-size="10" fill="#5F5E5A">applicants / programs — справочники</text>
<rect x="636" y="350" width="10" height="10" rx="2" fill="#185FA5"/>
<text x="652" y="359" font-size="10" fill="#5F5E5A">applications — главная таблица</text>
<rect x="636" y="368" width="10" height="10" rx="2" fill="#BA7517"/>
<text x="652" y="377" font-size="10" fill="#5F5E5A">status_logs — лог изменений</text>
<text x="636" y="397" font-size="10" fill="#888780">Связь 1:N — одна запись</text>
<text x="636" y="409" font-size="10" fill="#888780">связана со многими другими</text>

</svg>
