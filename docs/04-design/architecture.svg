<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif;background:white">
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Архитектура системы — Мониторинг приёмной кампании</text>

<!-- Frontend -->
<rect x="50" y="60" width="260" height="160" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="180" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#0C447C">Frontend</text>
<text x="180" y="105" text-anchor="middle" font-size="11" fill="#185FA5">React 18 + TypeScript + Vite</text>
<rect x="70" y="120" width="100" height="30" rx="4" fill="white" stroke="#85B7EB" stroke-width="0.5"/>
<text x="120" y="140" text-anchor="middle" font-size="10" fill="#0C447C">App.tsx</text>
<rect x="190" y="120" width="100" height="30" rx="4" fill="white" stroke="#85B7EB" stroke-width="0.5"/>
<text x="240" y="140" text-anchor="middle" font-size="10" fill="#0C447C">api.ts (Axios)</text>
<rect x="70" y="160" width="100" height="30" rx="4" fill="white" stroke="#85B7EB" stroke-width="0.5"/>
<text x="120" y="180" text-anchor="middle" font-size="10" fill="#0C447C">App.css</text>
<rect x="190" y="160" width="100" height="30" rx="4" fill="white" stroke="#85B7EB" stroke-width="0.5"/>
<text x="240" y="180" text-anchor="middle" font-size="10" fill="#0C447C">Фильтры, CSV</text>
<text x="180" y="210" text-anchor="middle" font-size="9" fill="#185FA5">localhost:5173</text>

<!-- Arrow Frontend → Backend -->
<line x1="312" y1="140" x2="368" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<text x="340" y="130" text-anchor="middle" font-size="9" fill="#666">REST API</text>
<text x="340" y="155" text-anchor="middle" font-size="9" fill="#666">JSON</text>

<!-- Backend -->
<rect x="370" y="60" width="260" height="220" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="500" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Backend</text>
<text x="500" y="105" text-anchor="middle" font-size="11" fill="#534AB7">Python 3.12 + FastAPI</text>
<rect x="390" y="120" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="442" y="138" text-anchor="middle" font-size="9" fill="#3C3489">applicants.py</text>
<rect x="505" y="120" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="557" y="138" text-anchor="middle" font-size="9" fill="#3C3489">programs.py</text>
<rect x="390" y="152" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="442" y="170" text-anchor="middle" font-size="9" fill="#3C3489">applications.py</text>
<rect x="505" y="152" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="557" y="170" text-anchor="middle" font-size="9" fill="#3C3489">dashboard.py</text>
<rect x="390" y="184" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="442" y="202" text-anchor="middle" font-size="9" fill="#3C3489">export.py</text>
<rect x="505" y="184" width="105" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="557" y="202" text-anchor="middle" font-size="9" fill="#3C3489">seed.py</text>
<rect x="390" y="216" width="220" height="26" rx="4" fill="white" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="500" y="234" text-anchor="middle" font-size="9" fill="#3C3489">schemas.py (Pydantic) + models.py (SQLAlchemy)</text>
<text x="500" y="270" text-anchor="middle" font-size="9" fill="#534AB7">localhost:8000</text>

<!-- Arrow Backend → DB -->
<line x1="500" y1="282" x2="500" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<text x="530" y="310" text-anchor="start" font-size="9" fill="#666">SQLAlchemy ORM</text>

<!-- Database -->
<rect x="370" y="335" width="260" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="500" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">PostgreSQL 16</text>
<text x="500" y="380" text-anchor="middle" font-size="10" fill="#0F6E56">applicants | programs | applications | status_logs</text>
<text x="500" y="400" text-anchor="middle" font-size="9" fill="#0F6E56">admission_db</text>

<!-- Browser -->
<rect x="50" y="280" width="260" height="70" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="180" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#444441">Браузер</text>
<text x="180" y="325" text-anchor="middle" font-size="10" fill="#5F5E5A">Chrome / Firefox / Edge</text>
<text x="180" y="340" text-anchor="middle" font-size="9" fill="#5F5E5A">Дашборд, таблицы, фильтры, экспорт CSV</text>

<!-- Arrow Browser → Frontend -->
<line x1="180" y1="278" x2="180" y2="222" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<text x="195" y="255" text-anchor="start" font-size="9" fill="#666">HTTP</text>

<!-- Swagger -->
<rect x="680" y="110" width="170" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="765" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Swagger UI</text>
<text x="765" y="155" text-anchor="middle" font-size="9" fill="#854F0B">/docs — автодокументация</text>
<line x1="632" y1="140" x2="678" y2="140" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

<!-- CSV Export -->
<rect x="680" y="200" width="170" height="50" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="765" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">CSV Export</text>
<text x="765" y="238" text-anchor="middle" font-size="9" fill="#854F0B">/export/raw, /export/report</text>
<line x1="632" y1="200" x2="678" y2="218" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)"/>

<!-- Legend -->
<rect x="50" y="440" width="800" height="45" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
<rect x="70" y="455" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5"/>
<text x="90" y="466" font-size="10" fill="#666">Frontend (React)</text>
<rect x="220" y="455" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text x="240" y="466" font-size="10" fill="#666">Backend (FastAPI)</text>
<rect x="380" y="455" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="400" y="466" font-size="10" fill="#666">База данных</text>
<rect x="520" y="455" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#BA7517"/>
<text x="540" y="466" font-size="10" fill="#666">Вспомогательное</text>
<rect x="680" y="455" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="700" y="466" font-size="10" fill="#666">Клиент</text>

<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
