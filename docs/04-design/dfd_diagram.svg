<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg" style="font-family:Arial,sans-serif;background:white">
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">DFD — Диаграмма потоков данных (уровень 0 и 1)</text>
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- DFD Level 0 -->
<text x="220" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">DFD уровень 0 (контекстная диаграмма)</text>

<!-- External: Сотрудник -->
<rect x="30" y="90" width="130" height="40" rx="0" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="95" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#444441">Сотрудник ПК</text>

<!-- External: Аналитик -->
<rect x="30" y="180" width="130" height="40" rx="0" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="95" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#444441">Аналитик</text>

<!-- Process: Система -->
<circle cx="320" cy="155" r="55" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="320" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Система</text>
<text x="320" y="165" text-anchor="middle" font-size="9" fill="#534AB7">мониторинга</text>

<!-- Data store: БД -->
<line x1="480" y1="135" x2="480" y2="175" stroke="#0F6E56" stroke-width="1"/>
<line x1="480" y1="135" x2="620" y2="135" stroke="#0F6E56" stroke-width="1"/>
<line x1="480" y1="175" x2="620" y2="175" stroke="#0F6E56" stroke-width="1"/>
<text x="550" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">D1 PostgreSQL</text>

<!-- Arrows Level 0 -->
<line x1="162" y1="105" x2="263" y2="135" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="200" y="108" font-size="9" fill="#666">Заявки, статусы</text>

<line x1="263" y1="170" x2="162" y2="195" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="195" y="195" font-size="9" fill="#666">Метрики, CSV</text>

<line x1="377" y1="155" x2="478" y2="155" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="428" y="148" font-size="9" fill="#666">Данные</text>

<!-- Separator -->
<line x1="30" y1="260" x2="870" y2="260" stroke="#ccc" stroke-dasharray="6 3"/>

<!-- DFD Level 1 -->
<text x="450" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">DFD уровень 1 (декомпозиция)</text>

<!-- External: Сотрудник -->
<rect x="30" y="310" width="110" height="36" rx="0" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="85" y="333" text-anchor="middle" font-size="10" font-weight="bold" fill="#444441">Сотрудник ПК</text>

<!-- Process 1: Управление заявками -->
<circle cx="250" cy="328" r="40" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="250" y="323" text-anchor="middle" font-size="9" font-weight="bold" fill="#0C447C">1.0</text>
<text x="250" y="336" text-anchor="middle" font-size="8" fill="#185FA5">Управление</text>
<text x="250" y="346" text-anchor="middle" font-size="8" fill="#185FA5">заявками</text>
<line x1="142" y1="328" x2="208" y2="328" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="175" y="320" font-size="8" fill="#666">CRUD</text>

<!-- Process 2: Дашборд -->
<circle cx="450" cy="328" r="40" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="450" y="323" text-anchor="middle" font-size="9" font-weight="bold" fill="#0C447C">2.0</text>
<text x="450" y="336" text-anchor="middle" font-size="8" fill="#185FA5">Расчёт</text>
<text x="450" y="346" text-anchor="middle" font-size="8" fill="#185FA5">метрик</text>

<!-- Process 3: Экспорт -->
<circle cx="650" cy="328" r="40" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="650" y="323" text-anchor="middle" font-size="9" font-weight="bold" fill="#0C447C">3.0</text>
<text x="650" y="336" text-anchor="middle" font-size="8" fill="#185FA5">Экспорт</text>
<text x="650" y="346" text-anchor="middle" font-size="8" fill="#185FA5">CSV</text>

<!-- Data store -->
<line x1="200" y1="420" x2="200" y2="450" stroke="#0F6E56" stroke-width="1"/>
<line x1="200" y1="420" x2="500" y2="420" stroke="#0F6E56" stroke-width="1"/>
<line x1="200" y1="450" x2="500" y2="450" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="440" text-anchor="middle" font-size="10" font-weight="bold" fill="#085041">D1 applicants | programs | applications | status_logs</text>

<!-- External: Аналитик -->
<rect x="750" y="310" width="110" height="36" rx="0" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="805" y="333" text-anchor="middle" font-size="10" font-weight="bold" fill="#444441">Аналитик</text>

<!-- Arrows Level 1 -->
<line x1="250" y1="370" x2="250" y2="418" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<line x1="280" y1="418" x2="280" y2="370" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="230" y="400" font-size="8" fill="#666">write</text>
<text x="285" y="400" font-size="8" fill="#666">read</text>

<line x1="292" y1="328" x2="408" y2="328" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="350" y="320" font-size="8" fill="#666">Данные заявок</text>

<line x1="492" y1="328" x2="608" y2="328" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="550" y="320" font-size="8" fill="#666">Агрегация</text>

<line x1="450" y1="370" x2="400" y2="418" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="410" y="395" font-size="8" fill="#666">read</text>

<line x1="650" y1="370" x2="480" y2="418" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="580" y="400" font-size="8" fill="#666">read</text>

<line x1="692" y1="328" x2="748" y2="328" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="720" y="320" font-size="8" fill="#666">CSV</text>

<line x1="748" y1="340" x2="492" y2="340" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="620" y="354" font-size="8" fill="#666">Метрики (JSON)</text>

<!-- Legend -->
<rect x="30" y="470" width="840" height="35" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
<rect x="50" y="480" width="24" height="14" rx="0" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="80" y="492" font-size="9" fill="#666">Внешняя сущность</text>
<circle cx="210" cy="487" r="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="226" y="492" font-size="9" fill="#666">Процесс</text>
<line x1="310" y1="481" x2="310" y2="495" stroke="#0F6E56"/><line x1="310" y1="481" x2="390" y2="481" stroke="#0F6E56"/><line x1="310" y1="495" x2="390" y2="495" stroke="#0F6E56"/>
<text x="396" y="492" font-size="9" fill="#666">Хранилище данных</text>
<line x1="530" y1="487" x2="570" y2="487" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="576" y="492" font-size="9" fill="#666">Поток данных</text>
</svg>