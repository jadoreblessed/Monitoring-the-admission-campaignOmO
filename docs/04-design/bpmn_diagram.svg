<svg width="100%" viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: white;">

<!-- Pool -->
<rect x="30" y="30" width="840" height="700" rx="0" fill="none" stroke="#333" stroke-width="1.5"/>
<text x="450" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Обработка заявки на поступление в РТУ МИРЭА</text>

<!-- Lane: Абитуриент -->
<rect x="30" y="30" width="840" height="180" fill="none" stroke="#333" stroke-width="0.5"/>
<rect x="30" y="30" width="30" height="180" fill="#f0f0f0" stroke="#333" stroke-width="0.5"/>
<text x="45" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" transform="rotate(-90, 45, 125)">Абитуриент</text>

<!-- Start -->
<circle cx="90" cy="110" r="14" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
<!-- Task: Заполнить заявку -->
<rect x="130" y="88" width="130" height="44" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1"/>
<text x="195" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Заполнить</text>
<text x="195" y="122" text-anchor="middle" font-size="10" fill="#0F6E56">форму заявки</text>
<line x1="104" y1="110" x2="128" y2="110" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Загрузить документы -->
<rect x="290" y="88" width="130" height="44" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1"/>
<text x="355" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Загрузить</text>
<text x="355" y="122" text-anchor="middle" font-size="10" fill="#0F6E56">документы</text>
<line x1="262" y1="110" x2="288" y2="110" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Отправить -->
<rect x="450" y="88" width="110" height="44" rx="6" fill="#e1f5ee" stroke="#0F6E56" stroke-width="1"/>
<text x="505" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Отправить</text>
<line x1="422" y1="110" x2="448" y2="110" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Ожидать решение -->
<rect x="590" y="88" width="110" height="44" rx="6" fill="#f1efe8" stroke="#5F5E5A" stroke-width="1"/>
<text x="645" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="#444441">Ожидать</text>
<text x="645" y="122" text-anchor="middle" font-size="10" fill="#5F5E5A">решение</text>
<line x1="562" y1="110" x2="588" y2="110" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Message down -->
<line x1="505" y1="134" x2="505" y2="250" stroke="#333" stroke-width="1" stroke-dasharray="6 3" marker-end="url(#a)"/>

<!-- Lane: Приёмная комиссия -->
<rect x="30" y="210" width="840" height="320" fill="none" stroke="#333" stroke-width="0.5"/>
<rect x="30" y="210" width="30" height="320" fill="#f0f0f0" stroke="#333" stroke-width="0.5"/>
<text x="45" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" transform="rotate(-90, 45, 375)">Приёмная комиссия</text>

<!-- Task: Проверить документы -->
<rect x="90" y="250" width="140" height="44" rx="6" fill="#e6f1fb" stroke="#185FA5" stroke-width="1"/>
<text x="160" y="269" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Проверить</text>
<text x="160" y="284" text-anchor="middle" font-size="10" fill="#185FA5">документы</text>
<path d="M505 272 L232 272" fill="none" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Gateway 1: Документы полные? -->
<polygon points="290,272 312,250 334,272 312,294" fill="#fef3c7" stroke="#92400e" stroke-width="1"/>
<text x="312" y="310" text-anchor="middle" font-size="10" fill="#92400e">Полные?</text>
<line x1="232" y1="272" x2="288" y2="272" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Да → Статус review -->
<rect x="370" y="250" width="120" height="44" rx="6" fill="#e6f1fb" stroke="#185FA5" stroke-width="1"/>
<text x="430" y="269" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Статус</text>
<text x="430" y="284" text-anchor="middle" font-size="10" fill="#185FA5">review</text>
<line x1="336" y1="272" x2="368" y2="272" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="352" y="264" text-anchor="middle" font-size="9" fill="#065f46">Да</text>

<!-- Нет → loop -->
<path d="M312 296 L312 326 L160 326 L160 296" fill="none" stroke="#A32D2D" stroke-width="1" marker-end="url(#a)"/>
<text x="236" y="340" text-anchor="middle" font-size="9" fill="#A32D2D">Нет: запросить документы</text>

<!-- Task: Проверить баллы ЕГЭ -->
<rect x="90" y="370" width="140" height="44" rx="6" fill="#e6f1fb" stroke="#185FA5" stroke-width="1"/>
<text x="160" y="389" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Проверить</text>
<text x="160" y="404" text-anchor="middle" font-size="10" fill="#185FA5">баллы ЕГЭ (ФИС)</text>
<path d="M430 296 L430 392 L232 392" fill="none" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Gateway 2: Баллы ok? -->
<polygon points="290,392 312,370 334,392 312,414" fill="#fef3c7" stroke="#92400e" stroke-width="1"/>
<text x="312" y="432" text-anchor="middle" font-size="10" fill="#92400e">Порог?</text>
<line x1="88" y1="392" x2="288" y2="392" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Да → Рейтинг -->
<rect x="370" y="370" width="120" height="44" rx="6" fill="#e6f1fb" stroke="#185FA5" stroke-width="1"/>
<text x="430" y="389" text-anchor="middle" font-size="11" font-weight="bold" fill="#0C447C">Сформировать</text>
<text x="430" y="404" text-anchor="middle" font-size="10" fill="#185FA5">рейтинг</text>
<line x1="336" y1="392" x2="368" y2="392" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="352" y="384" text-anchor="middle" font-size="9" fill="#065f46">Да</text>

<!-- Timer -->
<circle cx="550" cy="392" r="14" fill="#fef3c7" stroke="#92400e" stroke-width="1.5"/>
<text x="550" y="396" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">T</text>
<line x1="492" y1="392" x2="534" y2="392" stroke="#333" stroke-width="1" marker-end="url(#a)"/>
<text x="550" y="420" text-anchor="middle" font-size="9" fill="#92400e">Срок приёма</text>

<!-- Gateway 3: Места? -->
<polygon points="630,392 652,370 674,392 652,414" fill="#fef3c7" stroke="#92400e" stroke-width="1"/>
<text x="652" y="432" text-anchor="middle" font-size="10" fill="#92400e">Места?</text>
<line x1="566" y1="392" x2="628" y2="392" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Да → Зачислить -->
<rect x="700" y="250" width="120" height="44" rx="6" fill="#d1fae5" stroke="#065f46" stroke-width="1.5"/>
<text x="760" y="269" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Зачислить</text>
<text x="760" y="284" text-anchor="middle" font-size="10" fill="#1D9E75">enrolled</text>
<path d="M652 370 L652 272 L698 272" fill="none" stroke="#065f46" stroke-width="1" marker-end="url(#a)"/>
<text x="668" y="264" text-anchor="middle" font-size="9" fill="#065f46">Да</text>

<!-- Нет → Отклонить -->
<rect x="700" y="440" width="120" height="44" rx="6" fill="#fee2e2" stroke="#991b1b" stroke-width="1.5"/>
<text x="760" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Отклонить</text>
<text x="760" y="474" text-anchor="middle" font-size="10" fill="#A32D2D">rejected</text>
<path d="M676 392 L760 392 L760 438" fill="none" stroke="#A32D2D" stroke-width="1" marker-end="url(#a)"/>
<text x="718" y="384" text-anchor="middle" font-size="9" fill="#A32D2D">Нет</text>

<!-- Нет from Gateway 2 → Отклонить -->
<path d="M312 416 L312 462 L698 462" fill="none" stroke="#A32D2D" stroke-width="1" marker-end="url(#a)"/>
<text x="340" y="456" text-anchor="middle" font-size="9" fill="#A32D2D">Нет</text>

<!-- End events -->
<circle cx="760" cy="320" r="14" fill="#d1fae5" stroke="#065f46" stroke-width="3"/>
<line x1="760" y1="296" x2="760" y2="304" stroke="#065f46" stroke-width="1" marker-end="url(#a)"/>

<circle cx="760" cy="510" r="14" fill="#fee2e2" stroke="#991b1b" stroke-width="3"/>
<line x1="760" y1="486" x2="760" y2="494" stroke="#991b1b" stroke-width="1" marker-end="url(#a)"/>

<!-- Lane: Система (API) -->
<rect x="30" y="530" width="840" height="200" fill="none" stroke="#333" stroke-width="0.5"/>
<rect x="30" y="530" width="30" height="200" fill="#f0f0f0" stroke="#333" stroke-width="0.5"/>
<text x="45" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" transform="rotate(-90, 45, 635)">Система (API)</text>

<!-- Task: Зарегистрировать -->
<rect x="90" y="580" width="140" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="160" y="599" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Зарегистрировать</text>
<text x="160" y="614" text-anchor="middle" font-size="10" fill="#534AB7">status = new</text>

<!-- Task: Записать в журнал -->
<rect x="260" y="580" width="130" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="325" y="599" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Записать в</text>
<text x="325" y="614" text-anchor="middle" font-size="10" fill="#534AB7">журнал (StatusLog)</text>
<line x1="232" y1="602" x2="258" y2="602" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Метрики -->
<rect x="420" y="580" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="480" y="599" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Рассчитать</text>
<text x="480" y="614" text-anchor="middle" font-size="10" fill="#534AB7">метрики</text>
<line x1="392" y1="602" x2="418" y2="602" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Экспорт CSV -->
<rect x="570" y="580" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="630" y="599" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Экспорт</text>
<text x="630" y="614" text-anchor="middle" font-size="10" fill="#534AB7">CSV</text>
<line x1="542" y1="602" x2="568" y2="602" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Task: Уведомление -->
<rect x="720" y="580" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="780" y="599" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Уведомление</text>
<text x="780" y="614" text-anchor="middle" font-size="10" fill="#534AB7">абитуриенту</text>
<line x1="692" y1="602" x2="718" y2="602" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<!-- Legend -->
<rect x="90" y="660" width="730" height="55" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="0.5"/>
<text x="110" y="680" font-size="10" font-weight="bold" fill="#333">Легенда:</text>
<circle cx="180" cy="676" r="7" fill="#d1fae5" stroke="#065f46" stroke-width="1.5"/>
<text x="192" y="680" font-size="9" fill="#333">Начало/Конец</text>
<polygon points="260,676 270,666 280,676 270,686" fill="#fef3c7" stroke="#92400e" stroke-width="0.5"/>
<text x="286" y="680" font-size="9" fill="#333">Шлюз</text>
<rect x="330" y="668" width="30" height="16" rx="3" fill="#e6f1fb" stroke="#185FA5" stroke-width="0.5"/>
<text x="366" y="680" font-size="9" fill="#333">Задача</text>
<circle cx="420" cy="676" r="7" fill="#fef3c7" stroke="#92400e" stroke-width="1"/>
<text x="418" y="679" text-anchor="middle" font-size="8" font-weight="bold" fill="#92400e">T</text>
<text x="432" y="680" font-size="9" fill="#333">Таймер</text>
<line x1="480" y1="676" x2="510" y2="676" stroke="#333" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
<text x="516" y="680" font-size="9" fill="#333">Сообщение</text>
<text x="110" y="705" font-size="9" fill="#065f46">Зелёный = зачисление</text>
<text x="280" y="705" font-size="9" fill="#A32D2D">Красный = отклонение</text>
<text x="460" y="705" font-size="9" fill="#534AB7">Фиолетовый = системные задачи</text>
<text x="700" y="705" font-size="9" fill="#185FA5">Синий = комиссия</text>

<!-- Arrow marker -->
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

</svg>